<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolution Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #aaffaa;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    #no-webgpu {
      display: none;
      position: absolute;
      inset: 0;
      background: #111;
      color: #ff6666;
      font-family: sans-serif;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2em;
    }
    #no-webgpu { display: none; }
    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #ccc;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
    }
    #legend.hidden { display: none; }
    .legend-row { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-name { color: #eee; }
    .legend-desc { color: #888; }
    #shortcuts {
      position: absolute;
      bottom: 12px;
      right: 12px;
      color: #666;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      line-height: 1.8;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    #mode-overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: clamp(40px, 7vw, 88px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(0,0,0,0.9);
      opacity: 0;
    }
    #mode-overlay.show {
      opacity: 0.8;
      animation: mode-overlay-fade 1200ms linear forwards;
    }
    @keyframes mode-overlay-fade {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }
    kbd {
      color: #999;
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    /* Slightly lighter GUI panel theme; world background remains unchanged. */
    .tp-dfwv .tp-rotv {
      --tp-base-background-color: hsl(222, 12%, 24%);
      --tp-base-shadow-color: rgba(0, 0, 0, 0.34);
      --tp-container-background-color: rgba(210, 220, 255, 0.12);
      --tp-container-background-color-hover: rgba(210, 220, 255, 0.16);
      --tp-container-background-color-focus: rgba(210, 220, 255, 0.20);
      --tp-container-background-color-active: rgba(210, 220, 255, 0.24);
      --tp-input-background-color: rgba(210, 220, 255, 0.14);
      --tp-input-background-color-hover: rgba(210, 220, 255, 0.18);
      --tp-input-background-color-focus: rgba(210, 220, 255, 0.22);
      --tp-input-background-color-active: rgba(210, 220, 255, 0.26);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="legend"></div>
  <div id="shortcuts">
    <kbd>L</kbd> Legend &middot;
    <kbd>V</kbd> View Mode &middot;
    <kbd>H</kbd> HUD Detail &middot;
    <kbd>Scroll</kbd> Zoom &middot;
    <kbd>Drag</kbd> Pan
  </div>
  <div id="mode-overlay"></div>
  <div id="no-webgpu">
    <div>
      <h2>WebGPU Not Available</h2>
      <p>This simulator requires WebGPU support.<br>
      Try Chrome 113+ or Edge 113+ with WebGPU enabled.</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
