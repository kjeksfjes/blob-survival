<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolution Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { position: relative; }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #debug-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #aaffaa;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.55;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    #no-webgpu {
      display: none;
      position: absolute;
      inset: 0;
      background: #111;
      color: #ff6666;
      font-family: sans-serif;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2em;
    }
    #no-webgpu { display: none; }
    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #ccc;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
    }
    #legend.hidden { display: none; }
    .legend-row { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-name { color: #eee; }
    .legend-desc { color: #888; }
    #shortcuts {
      position: absolute;
      bottom: 12px;
      right: 12px;
      color: #666;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      line-height: 1.8;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    #inspector {
      position: absolute;
      right: 12px;
      bottom: 70px;
      width: min(340px, calc(100vw - 24px));
      max-height: calc(100vh - 96px);
      overflow: auto;
      color: #d9e6ff;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      line-height: 1.4;
      background: rgba(10, 15, 28, 0.82);
      border: 1px solid rgba(180, 203, 255, 0.28);
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.42);
      padding: 10px 10px 8px;
      z-index: 5;
    }
    .inspector-card { display: flex; flex-direction: column; gap: 8px; }
    .inspector-headline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .inspector-empty { color: #b4c6e6; }
    .inspector-deceased {
      border: 1px solid rgba(255, 115, 96, 0.5);
      background: linear-gradient(180deg, rgba(84, 24, 20, 0.30) 0%, rgba(10, 15, 28, 0) 55%);
      border-radius: 8px;
      padding: 8px;
    }
    .inspector-title { color: #f2f6ff; font-weight: 700; font-size: 12px; letter-spacing: 0.02em; }
    .inspector-close {
      appearance: none;
      border: 1px solid rgba(180, 203, 255, 0.36);
      border-radius: 6px;
      background: rgba(90, 111, 160, 0.18);
      color: #d9e6ff;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1;
      width: 22px;
      height: 20px;
      padding: 0;
      cursor: pointer;
    }
    .inspector-close:hover {
      background: rgba(120, 145, 204, 0.24);
      border-color: rgba(200, 218, 255, 0.52);
      color: #f0f6ff;
    }
    .inspector-close:active {
      background: rgba(68, 88, 132, 0.28);
    }
    .inspector-sub { color: #8fb0e8; }
    .inspector-hint { color: #b4c6e6; }
    .inspector-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .inspector-badge {
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid rgba(190, 208, 245, 0.45);
      color: #d5e5ff;
      background: rgba(122, 145, 193, 0.18);
      font-size: 10px;
      letter-spacing: 0.01em;
    }
    .inspector-badge.lock { border-color: rgba(248, 231, 151, 0.7); color: #f8e797; background: rgba(248, 231, 151, 0.12); }
    .inspector-badge.leader { border-color: rgba(205, 144, 255, 0.7); color: #dba7ff; background: rgba(205, 144, 255, 0.12); }
    .inspector-badge.scout { border-color: rgba(182, 230, 255, 0.7); color: #d4f4ff; background: rgba(182, 230, 255, 0.12); }
    .inspector-badge.predator { border-color: rgba(255, 146, 146, 0.7); color: #ffb2b2; background: rgba(255, 146, 146, 0.12); }
    .inspector-badge.solo { border-color: rgba(200, 200, 200, 0.6); color: #d7d7d7; background: rgba(200, 200, 200, 0.1); }
    .inspector-section {
      border-top: 1px solid rgba(184, 206, 248, 0.14);
      padding-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .inspector-sec-title { color: #a9c7ff; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; margin-bottom: 2px; }
    .inspector-row { display: flex; justify-content: space-between; gap: 8px; }
    .inspector-k { color: #9fb2d6; }
    .inspector-v { color: #edf4ff; text-align: right; }
    .inspector-help-label {
      cursor: help;
      border-bottom: 1px dotted rgba(173, 197, 239, 0.42);
    }
    .inspector-chip {
      display: inline-block;
      border-radius: 999px;
      padding: 0 6px;
      border: 1px solid rgba(188, 202, 228, 0.4);
      font-size: 10px;
    }
    .inspector-chip.on { color: #b8ffd3; border-color: rgba(127, 234, 176, 0.6); background: rgba(127, 234, 176, 0.1); }
    .inspector-chip.off { color: #e8c0c0; border-color: rgba(238, 161, 161, 0.55); background: rgba(238, 161, 161, 0.08); }
    .inspector-advanced {
      border-top: 1px solid rgba(184, 206, 248, 0.18);
      padding-top: 6px;
      margin-top: 2px;
    }
    .inspector-advanced > summary {
      color: #b8ccf2;
      cursor: pointer;
      user-select: none;
      margin-bottom: 4px;
    }
    #mode-overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: clamp(40px, 7vw, 88px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(0,0,0,0.9);
      opacity: 0;
    }
    #mode-overlay.show {
      opacity: 0.8;
      animation: mode-overlay-fade 1200ms linear forwards;
    }
    @keyframes mode-overlay-fade {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }
    kbd {
      color: #999;
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    /* Slightly lighter GUI panel theme; world background remains unchanged. */
    .tp-dfwv .tp-rotv {
      --tp-base-background-color: hsl(222, 12%, 24%);
      --tp-base-shadow-color: rgba(0, 0, 0, 0.34);
      --tp-container-background-color: rgba(210, 220, 255, 0.12);
      --tp-container-background-color-hover: rgba(210, 220, 255, 0.16);
      --tp-container-background-color-focus: rgba(210, 220, 255, 0.20);
      --tp-container-background-color-active: rgba(210, 220, 255, 0.24);
      --tp-input-background-color: rgba(210, 220, 255, 0.14);
      --tp-input-background-color-hover: rgba(210, 220, 255, 0.18);
      --tp-input-background-color-focus: rgba(210, 220, 255, 0.22);
      --tp-input-background-color-active: rgba(210, 220, 255, 0.26);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="debug-overlay"></canvas>
  <div id="hud"></div>
  <div id="legend"></div>
  <div id="shortcuts">
    <kbd>L</kbd> Legend &middot;
    <kbd>Space</kbd> Pause &middot;
    <kbd>H</kbd> HUD Detail &middot;
    <kbd>Scroll</kbd> Zoom &middot;
    <kbd>Drag</kbd> Pan
  </div>
  <div id="inspector"></div>
  <div id="mode-overlay"></div>
  <div id="no-webgpu">
    <div>
      <h2>WebGPU Not Available</h2>
      <p>This simulator requires WebGPU support.<br>
      Try Chrome 113+ or Edge 113+ with WebGPU enabled.</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
