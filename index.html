<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolution Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #aaffaa;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    #no-webgpu {
      display: none;
      position: absolute;
      inset: 0;
      background: #111;
      color: #ff6666;
      font-family: sans-serif;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2em;
    }
    #no-webgpu { display: none; }
    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #ccc;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
    }
    #legend.hidden { display: none; }
    .legend-row { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-name { color: #eee; }
    .legend-desc { color: #888; }
    #shortcuts {
      position: absolute;
      bottom: 12px;
      right: 12px;
      color: #666;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      line-height: 1.8;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    kbd {
      color: #999;
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="legend"></div>
  <div id="shortcuts">
    <kbd>L</kbd> Legend &middot;
    <kbd>Scroll</kbd> Zoom &middot;
    <kbd>Drag</kbd> Pan
  </div>
  <div id="no-webgpu">
    <div>
      <h2>WebGPU Not Available</h2>
      <p>This simulator requires WebGPU support.<br>
      Try Chrome 113+ or Edge 113+ with WebGPU enabled.</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
