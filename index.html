<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolution Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #aaffaa;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    #no-webgpu {
      display: none;
      position: absolute;
      inset: 0;
      background: #111;
      color: #ff6666;
      font-family: sans-serif;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2em;
    }
    #no-webgpu { display: none; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="no-webgpu">
    <div>
      <h2>WebGPU Not Available</h2>
      <p>This simulator requires WebGPU support.<br>
      Try Chrome 113+ or Edge 113+ with WebGPU enabled.</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
